name: Keep Streamlit App Alive via Auto-Commit

on:
  schedule:
    # 每 6 小時自動執行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update timestamp file
        run: |
          echo "Last pinged at: $(date)" > ping.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add ping.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: keep alive ping [skip ci]" && git push)